#==========================================================================
# Description: Build Armbian for Panther X2 using self-compiled kernel
# Copyright (C) 2025 https://github.com/Lyric-c/amlogic-s9xxx-armbian
#==========================================================================

name: Build Armbian for Panther X2

on:
  workflow_dispatch:
    inputs:
      RELEASE:
        description: '系统发行版'
        default: 'trixie'
        required: true
        type: choice
        options:
          - trixie
          - bookworm
          - noble
          - jammy
      KERNEL_BRANCH:
        description: '内核分支 (对应 panther-x2 仓库的 BRANCH)'
        default: 'vendor'
        required: true
        type: choice
        options:
          - vendor
          - current
          - edge
      ROOTFS_TYPE:
        description: '根文件系统类型'
        default: 'ext4'
        type: choice
        options:
          - ext4
          - btrfs
      BUILD_EDITION:
        description: '镜像版本'
        default: 'server'
        type: choice
        options:
          - server
          - desktop

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo apt-get -y update
          sudo apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-build-armbian-depends)
          sudo systemctl daemon-reload
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo timedatectl set-ntp true
          date -u

      - name: Create virtual disk for extended storage
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Build disk: ${root_size}G on ${build_dev}"
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th

      - name: Setup workspace symlinks
        working-directory: /builder
        run: |
          mkdir -p build
          ln -sf /builder/build ${{ github.workspace }}/build

      - name: Map kernel branch to ophub parameters
        id: kernel_params
        run: |
          case "${{ inputs.KERNEL_BRANCH }}" in
            vendor)
              KERNEL_TAG="rk35xx"
              KERNEL_VER="6.1.y"
              ;;
            current)
              KERNEL_TAG="stable"
              KERNEL_VER="6.18.y"
              ;;
            edge)
              KERNEL_TAG="stable"
              KERNEL_VER="7.1.y"
              ;;
            *)
              KERNEL_TAG="stable"
              KERNEL_VER="6.18.y"
              ;;
          esac
          echo "KERNEL_TAG=${KERNEL_TAG}" >> "${GITHUB_ENV}"
          echo "KERNEL_VER=${KERNEL_VER}" >> "${GITHUB_ENV}"
          echo "Kernel tag: ${KERNEL_TAG}, version: ${KERNEL_VER}"

          # Build tag for Release upload
          BUILD_TAG="Armbian_${{ inputs.RELEASE }}_arm64_${{ inputs.BUILD_EDITION }}_$(date +'%Y.%m')"
          echo "BUILD_TAG=${BUILD_TAG}" >> "${GITHUB_ENV}"

      - name: Download base Armbian image from ophub Releases
        working-directory: /builder
        run: |
          armbian_buildpath="build/output/images"
          mkdir -p "${armbian_buildpath}"

          # Search ophub upstream releases for a matching arm64 server image
          RELEASE_QUERY="${{ inputs.RELEASE }}"
          echo "Looking for base image with release: ${RELEASE_QUERY}"

          # Query ophub upstream releases via GitHub API
          release_json=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/ophub/amlogic-s9xxx-armbian/releases?per_page=30")

          # Find a release tag containing the target release name, get the latest .img.gz asset
          asset_url=$(echo "${release_json}" | jq -r \
            --arg REL "${RELEASE_QUERY}" \
            '[.[] | select(.tag_name | test($REL; "i"))] |
             sort_by(.published_at) | reverse | .[0].assets[] |
             select(.name | endswith(".img.gz")) |
             .url' | head -1)

          # Get the asset filename from the API response
          asset_name=$(echo "${release_json}" | jq -r \
            --arg REL "${RELEASE_QUERY}" \
            '[.[] | select(.tag_name | test($REL; "i"))] |
             sort_by(.published_at) | reverse | .[0].assets[] |
             select(.name | endswith(".img.gz")) |
             .name' | head -1)

          if [[ -z "${asset_name}" || "${asset_name}" == "null" ]]; then
            echo "Error: No base image found in ophub releases for ${RELEASE_QUERY}."
            exit 1
          fi

          # Download the asset via GitHub API (binary stream), keep original name
          echo "Downloading: ${asset_name}"
          curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/octet-stream" \
            "${asset_url}" \
            -o "${armbian_buildpath}/${asset_name}"

          # Decompress .gz to .img (rebuild expects *-trunk_*.img)
          gunzip -f "${armbian_buildpath}/${asset_name}"
          echo "Base image ready: ${armbian_buildpath}/${asset_name%.gz}"

      - name: Fix model_database.conf kernel tags for Panther X2
        run: |
          # Patch Panther X2 entry to use only the single kernel tag matching KERNEL_BRANCH.
          # This prevents rebuild from trying to download non-existent kernels from the wrong tag.
          case "${{ inputs.KERNEL_BRANCH }}" in
            vendor)  NEW_TAG="rk35xx/6.1.y" ;;
            current) NEW_TAG="stable/6.18.y" ;;
            edge)    NEW_TAG="stable/7.1.y" ;;
            *)       NEW_TAG="stable/6.18.y" ;;
          esac
          CONF="build-armbian/armbian-files/common-files/etc/model_database.conf"
          echo "Patching Panther X2 KERNEL_TAGS → ${NEW_TAG}"
          sed -i "/^r301[[:space:]]*:Panther-X2/ s|:[^:]*\(:rockchip\)|:${NEW_TAG}\1|" "${CONF}"
          grep 'r301.*Panther' "${CONF}"

      - name: Rebuild Armbian for Panther X2
        id: rebuild
        run: |
          sudo ./rebuild \
            -b panther-x2 \
            -r Lyric-c/panther-x2 \
            -k "${KERNEL_VER}" \
            -a true \
            -t "${{ inputs.ROOTFS_TYPE }}" \
            -n "${{ inputs.KERNEL_BRANCH }}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Verify boot partition
        if: ${{ steps.rebuild.outputs.status == 'success' && !cancelled() }}
        run: |
          echo "=== Checking boot partition files ==="
          # Mount the rebuilt image to verify
          IMG=$(ls build/output/images/Armbian_*.img 2>/dev/null | head -1)
          if [ -z "${IMG}" ]; then
            IMG=$(ls build/output/images/Armbian_*.img.gz 2>/dev/null | head -1)
            [ -n "${IMG}" ] && gunzip -k "${IMG}" && IMG="${IMG%.gz}"
          fi
          if [ -z "${IMG}" ]; then
            echo "WARNING: No .img found to verify"
            exit 0
          fi
          BOOT_OFFSET=$((16 * 2048))  # 16MiB skip for Rockchip
          mkdir -p /tmp/boot-check
          sudo mount -o loop,offset=$((BOOT_OFFSET * 512)) "${IMG}" /tmp/boot-check 2>/dev/null || {
            echo "WARNING: Could not mount boot partition (offset=${BOOT_OFFSET})"
            exit 0
          }
          echo "--- /boot contents ---"
          ls -la /tmp/boot-check/
          echo ""
          echo "--- Checking critical files ---"
          for f in Image uInitrd boot.scr armbianEnv.txt; do
            if [ -e "/tmp/boot-check/$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
            fi
          done
          echo "--- DTB check ---"
          FDTFILE="rockchip/rk3566-panther-x2.dtb"
          if [ -f "/tmp/boot-check/dtb/${FDTFILE}" ]; then
            echo "  ✓ dtb/${FDTFILE}"
          else
            echo "  ✗ MISSING: dtb/${FDTFILE}"
          fi
          sudo umount /tmp/boot-check

      - name: Upload Armbian images to Release
        uses: softprops/action-gh-release@v3
        if: ${{ steps.rebuild.outputs.status == 'success' && !cancelled() }}
        with:
          tag_name: "${{ env.BUILD_TAG }}"
          name: "Armbian ${{ inputs.RELEASE }} Panther X2 ${{ inputs.KERNEL_BRANCH }}"
          files: build/output/images/Armbian*.img.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
