#==========================================================================
# Description: Build Armbian for Panther X2 using self-compiled kernel
# Copyright (C) 2025 https://github.com/Lyric-c/amlogic-s9xxx-armbian
#==========================================================================

name: Build Armbian for Panther X2

on:
  workflow_dispatch:
    inputs:
      RELEASE:
        description: '系统发行版'
        default: 'trixie'
        required: true
        type: choice
        options:
          - trixie
          - bookworm
          - noble
          - jammy
      KERNEL_BRANCH:
        description: '内核分支 (对应 panther-x2 仓库的 BRANCH)'
        default: 'vendor'
        required: true
        type: choice
        options:
          - vendor
          - current
          - edge
      ROOTFS_TYPE:
        description: '根文件系统类型'
        default: 'ext4'
        type: choice
        options:
          - ext4
          - btrfs
      BUILD_EDITION:
        description: '镜像版本'
        default: 'server'
        type: choice
        options:
          - server
          - desktop

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-26.04-arm
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo apt-get -y update
          sudo apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2604-build-armbian-depends)
          sudo systemctl daemon-reload
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo timedatectl set-ntp true
          date -u

      - name: Create virtual disk for extended storage
        run: |
          root_avail=$(df --block-size=1G / | tail -1 | awk '{print $4}')
          root_size=$(( root_avail - 4 ))
          [[ "${root_size}" -gt 0 ]] || { echo "Error: Insufficient space on /: ${root_avail}G available"; exit 1; }
          sudo truncate -s "${root_size}"G /root.img
          build_dev=$(sudo losetup --find --show /root.img)
          echo "Build disk: ${root_size}G on ${build_dev}"
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 "${build_dev}"
          sudo mkdir -p /builder
          sudo mount "${build_dev}" /builder
          sudo chown -R runner:runner /builder
          df -Th

      - name: Setup workspace symlinks
        working-directory: /builder
        run: |
          mkdir -p build
          ln -sf /builder/build ${{ github.workspace }}/build

      - name: Map kernel branch to ophub parameters
        id: kernel_params
        run: |
          case "${{ inputs.KERNEL_BRANCH }}" in
            vendor)
              KERNEL_TAG="rk35xx"
              KERNEL_VER="6.1.y"
              ;;
            current)
              KERNEL_TAG="stable"
              KERNEL_VER="6.18.y"
              ;;
            edge)
              KERNEL_TAG="stable"
              KERNEL_VER="7.1.y"
              ;;
            *)
              KERNEL_TAG="stable"
              KERNEL_VER="6.18.y"
              ;;
          esac
          echo "KERNEL_TAG=${KERNEL_TAG}" >> "${GITHUB_ENV}"
          echo "KERNEL_VER=${KERNEL_VER}" >> "${GITHUB_ENV}"
          echo "Kernel tag: ${KERNEL_TAG}, version: ${KERNEL_VER}"

          # Build tag for Release upload
          BUILD_TAG="Armbian_${{ inputs.RELEASE }}_arm64_${{ inputs.BUILD_EDITION }}_$(date +'%Y.%m')"
          echo "BUILD_TAG=${BUILD_TAG}" >> "${GITHUB_ENV}"

      - name: Download official Armbian base image
        working-directory: /builder
        run: |
          armbian_buildpath="build/output/images"
          mkdir -p "${armbian_buildpath}"

          # Use Rock-3C official image as base rootfs (same RK3566 SoC)
          armbian_site="https://armbian.tnahosting.net/dl/rock-3c/archive/"
          armbian_pattern="Armbian.*${{ inputs.RELEASE }}.*.img.xz"

          armbian_file=$(curl -s "${armbian_site}" | grep -oE "${armbian_pattern}" | head -n 1)
          if [[ -z "${armbian_file}" ]]; then
            echo "No Rock-3C image found, trying odroidn2..."
            armbian_site="https://armbian.tnahosting.net/dl/odroidn2/archive/"
            armbian_file=$(curl -s "${armbian_site}" | grep -oE "${armbian_pattern}" | head -n 1)
          fi

          if [[ -z "${armbian_file}" ]]; then
            echo "Error: No base Armbian image found for ${RELEASE}."
            exit 1
          fi

          armbian_url="${armbian_site}${armbian_file}"
          echo "Downloading base image: ${armbian_url}"
          wget -q "${armbian_url}" -P "${armbian_buildpath}"

          # Decompress .xz to .img
          xz_img="${armbian_buildpath}/${armbian_file}"
          img_file="${xz_img%.xz}"
          if [[ -f "${xz_img}" ]]; then
            xz -d "${xz_img}"
            echo "Decompressed: ${img_file}"
          fi

      - name: Rebuild Armbian for Panther X2
        id: rebuild
        run: |
          sudo ./rebuild \
            -b panther-x2 \
            -r Lyric-c/panther-x2 \
            -u "${KERNEL_TAG}" \
            -k "${KERNEL_VER}" \
            -t "${{ inputs.ROOTFS_TYPE }}" \
            -n "${{ inputs.KERNEL_BRANCH }}"
          echo "status=success" >> "${GITHUB_OUTPUT}"

      - name: Upload Armbian images to Release
        uses: softprops/action-gh-release@v3
        if: ${{ steps.rebuild.outputs.status == 'success' && !cancelled() }}
        with:
          tag_name: "${{ env.BUILD_TAG }}"
          name: "Armbian ${{ inputs.RELEASE }} Panther X2 ${{ inputs.KERNEL_BRANCH }}"
          files: build/output/images/Armbian*.img.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
